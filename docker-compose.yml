version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: sports_shop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sports_shop
      MYSQL_USER: shop
      MYSQL_PASSWORD: shop
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sports_shop_backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend/app:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5173
      NUVEM_PAGO_API_URL: https://api.sandbox.nuvempago.com/v1
      NUVEM_PAGO_API_KEY: changeme
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: sports_shop
      DB_USERNAME: shop
      DB_PASSWORD: shop
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: sports_shop_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend/app:/var/www/html
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sports_shop_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  mysql_data:

version: "3.9"

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sports_store}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-appsecret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: "SportsStore"
    env_file:
      - ./backend/.env.docker
    environment:
      DB_HOST: mysql
      DB_DATABASE: ${MYSQL_DATABASE:-sports_store}
      DB_USERNAME: ${MYSQL_USER:-app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-appsecret}
      NUVEM_PAGO_BASE_URL: ${NUVEM_PAGO_BASE_URL:-https://api.nuvempago.com}
      NUVEM_PAGO_API_KEY: ${NUVEM_PAGO_API_KEY:-changeme}
      APP_URL: http://localhost:8080
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - laravel_storage:/var/www/html/storage
      - ./backend_overlay:/docker-backend-overlay:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      - backend

volumes:
  db_data:
  laravel_storage:

