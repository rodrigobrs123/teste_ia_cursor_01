version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: sports_store_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sports_store
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - sports_network

  # Laravel Backend API
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sports_store_api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=sports_store
      - DB_USERNAME=laravel
      - DB_PASSWORD=password
    networks:
      - sports_network

  # React Frontend
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sports_store_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    networks:
      - sports_network

volumes:
  mysql_data:

networks:
  sports_network:
    driver: bridge